<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ミッション｜全国水族館スタンプラリー</title>
  <meta name="description" content="全国水族館スタンプラリーのミッションページ。訪問数バッジ・地域制覇・都道府県制覇・生き物バッジの達成状況を確認できます。">
  <link rel="canonical" href="https://aquarium-log.onrender.com/missions/">
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .missions-wrap { max-width: 700px; margin: 24px auto; padding: 0 16px; }
    .missions-title { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
    .missions-sub  { font-size: 13px; color: #666; margin-bottom: 20px; }
    .missions-login-msg { background: #f0f8ff; border: 1px solid #90e0ef; border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; font-size: 14px; }
    .missions-login-msg a { color: #0077b6; font-weight: bold; }
    .missions-section { margin-bottom: 28px; }
    .missions-section h2 { font-size: 15px; font-weight: bold; color: #444; border-bottom: 2px solid #90e0ef; padding-bottom: 4px; margin-bottom: 12px; }
    .badge-list { display: flex; flex-direction: column; gap: 10px; }
    .badge-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fafafa; }
    .badge-row.earned { background: #fffde7; border-color: #e6c800; }
    .badge-row.earned.pref { background: #f1f8e9; border-color: #66bb6a; }
    .badge-row.earned.region { background: #e3f2fd; border-color: #42a5f5; }
    .badge-row.earned.animal { background: #fce4ec; border-color: #f48fb1; }
    .badge-icon { font-size: 26px; flex-shrink: 0; width: 36px; text-align: center; filter: grayscale(1); opacity: 0.4; }
    .badge-row.earned .badge-icon { filter: none; opacity: 1; }
    .badge-info { flex: 1; }
    .badge-name { font-weight: bold; font-size: 14px; color: #333; }
    .badge-row.earned .badge-name { color: #5a4a00; }
    .badge-row.earned.pref .badge-name { color: #1b5e20; }
    .badge-row.earned.region .badge-name { color: #0d47a1; }
    .badge-row.earned.animal .badge-name { color: #880e4f; }
    .badge-desc { font-size: 12px; color: #888; margin-top: 2px; }
    .badge-status { font-size: 12px; font-weight: bold; color: #bbb; flex-shrink: 0; }
    .badge-row.earned .badge-status { color: #e6c800; }
    .badge-row.earned.pref .badge-status { color: #43a047; }
    .badge-row.earned.region .badge-status { color: #1565c0; }
    .badge-row.earned.animal .badge-status { color: #ad1457; }
    .pref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .pref-item { padding: 7px 10px; border-radius: 6px; border: 1px solid #e0e0e0; background: #fafafa; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    .pref-item.earned { background: #f1f8e9; border-color: #66bb6a; }
    .pref-item.earned .pref-name { font-weight: bold; color: #1b5e20; }
    .pref-progress { font-size: 11px; color: #999; }
    .pref-item.earned .pref-progress { color: #43a047; font-weight: bold; }
    .loading { padding: 24px; text-align: center; color: #888; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/" style="color:inherit;text-decoration:none;">全国水族館スタンプラリー</a></h1>
    <div class="userbox" id="userbox">
      <button id="menuBtn" class="hamburger-btn" aria-label="メニューを開く">☰</button>
    </div>
  </header>

  <div id="drawerOverlay" class="drawer-overlay"></div>
  <nav id="drawer" class="drawer" aria-hidden="true">
    <button id="drawerClose" class="drawer-close" aria-label="閉じる">×</button>
    <div class="drawer__login">
      <span id="loginStatus" class="drawer-login-status"></span>
      <button class="linklike" id="googleLogin" type="button">Googleでログイン</button>
      <button class="linklike" id="logoutBtn" type="button" style="display:none;">ログアウト</button>
    </div>
    <div class="drawer__inner">
      <a href="/" class="drawer-link">トップページ</a>
      <a id="galleryBtn" href="/gallery/" class="drawer-link" style="display:none;">📷 マイ写真ギャラリー</a>
      <a href="/missions/" class="drawer-link">🏆 ミッション</a>
      <a href="/about/" class="drawer-link">このアプリについて</a>
      <a href="/contact/" class="drawer-link">お問い合わせ</a>
      <a href="/privacy/" class="drawer-link">プライバシーポリシー</a>
    </div>
  </nav>

  <div class="missions-wrap">
    <div class="missions-title">🏆 ミッション</div>
    <div class="missions-sub">達成バッジと制覇進捗を確認できます</div>

    <div id="loginMsg" class="missions-login-msg" style="display:none;">
      <a href="/login">Googleでログイン</a>すると訪問記録に基づいた達成状況が表示されます
    </div>

    <div id="content"><div class="loading">読み込み中...</div></div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <a href="/contact/">お問い合わせ</a>
      <a href="/privacy/">プライバシーポリシー</a>
      <span>© 2025 全国水族館スタンプラリー</span>
    </div>
  </footer>

  <script src="/nav.js?v=20260305-1"></script>
  <script>
  (function() {
    var REGION_ORDER = ["北海道","東北","関東","中部","近畿","中国","四国","九州・沖縄"];
    var REGION_BY_PREF = {
      "北海道":"北海道",
      "青森県":"東北","岩手県":"東北","宮城県":"東北","秋田県":"東北","山形県":"東北","福島県":"東北",
      "茨城県":"関東","栃木県":"関東","群馬県":"関東","埼玉県":"関東","千葉県":"関東","東京都":"関東","神奈川県":"関東",
      "新潟県":"中部","富山県":"中部","石川県":"中部","福井県":"中部","山梨県":"中部","長野県":"中部","岐阜県":"中部","静岡県":"中部","愛知県":"中部",
      "三重県":"近畿","滋賀県":"近畿","京都府":"近畿","大阪府":"近畿","兵庫県":"近畿","奈良県":"近畿","和歌山県":"近畿",
      "鳥取県":"中国","島根県":"中国","岡山県":"中国","広島県":"中国","山口県":"中国",
      "徳島県":"四国","香川県":"四国","愛媛県":"四国","高知県":"四国",
      "福岡県":"九州・沖縄","佐賀県":"九州・沖縄","長崎県":"九州・沖縄","熊本県":"九州・沖縄","大分県":"九州・沖縄","宮崎県":"九州・沖縄","鹿児島県":"九州・沖縄","沖縄県":"九州・沖縄"
    };
    function regionOf(pref) { return REGION_BY_PREF[pref] || "その他"; }

    var VISIT_BADGES = [
      { id: "v10",  label: "10館達成",  icon: "🥉", req: "10館訪問",      check: function(v) { return v >= 10; } },
      { id: "v30",  label: "30館達成",  icon: "🥈", req: "30館訪問",      check: function(v) { return v >= 30; } },
      { id: "v50",  label: "50館達成",  icon: "🥇", req: "50館訪問",      check: function(v) { return v >= 50; } },
      { id: "v100", label: "100館達成", icon: "🏆", req: "100館訪問",     check: function(v) { return v >= 100; } },
      { id: "all",  label: "全館制覇",  icon: "👑", req: "全水族館を制覇", check: function(v, t) { return t > 0 && v >= t; } },
    ];

    var ANIMAL_BADGES = [
      { id: "a_penguin",   label: "ペンギン好き", icon: "🐧", req: "ペンギンのいる水族館を3館訪問",
        check: function(items) { return items.filter(function(x) { return !x.is_closed && x.visited && x.has_penguin; }).length >= 3; } },
      { id: "a_dolphin",   label: "イルカ好き",   icon: "🐬", req: "イルカのいる水族館を3館訪問",
        check: function(items) { return items.filter(function(x) { return !x.is_closed && x.visited && x.has_dolphin; }).length >= 3; } },
      { id: "a_sealion",   label: "アシカ好き",   icon: "🦭", req: "アシカのいる水族館を3館訪問",
        check: function(items) { return items.filter(function(x) { return !x.is_closed && x.visited && x.has_sealion; }).length >= 3; } },
      { id: "a_orca",      label: "シャチ制覇",   icon: "🐋", req: "シャチのいる全水族館を制覇",
        check: function(items) { var w = items.filter(function(x) { return !x.is_closed && x.has_orca; }); return w.length > 0 && w.every(function(x) { return x.visited; }); } },
      { id: "a_jellyfish", label: "クラゲ好き",   icon: "🪼", req: "クラゲのいる水族館を3館訪問",
        check: function(items) { return items.filter(function(x) { return !x.is_closed && x.visited && x.has_jellyfish; }).length >= 3; } },
    ];

    (async function() {
      var loggedIn = false;
      var items = [];

      try {
        var me = await fetch("/api/me", { credentials: "same-origin" }).then(function(r) { return r.json(); });
        loggedIn = !!(me && me.user_id);
      } catch(e) {}

      if (!loggedIn) {
        document.getElementById("loginMsg").style.display = "";
      }

      try {
        var url = loggedIn ? "/api/aquariums" : "/api/public/aquariums";
        items = await fetch(url, { credentials: "same-origin" }).then(function(r) { return r.json(); });
      } catch(e) {
        document.getElementById("content").innerHTML = "<div class='loading'>データの取得に失敗しました</div>";
        return;
      }

      var openItems = items.filter(function(x) { return !x.is_closed; });
      var total = openItems.length;
      var visitedCount = loggedIn ? openItems.filter(function(x) { return x.visited; }).length : 0;

      var content = document.getElementById("content");
      content.innerHTML = "";

      function makeRow(icon, label, req, earned, cls) {
        var row = document.createElement("div");
        row.className = "badge-row" + (earned ? " earned" + (cls ? " " + cls : "") : "");
        row.innerHTML =
          '<div class="badge-icon">' + icon + '</div>' +
          '<div class="badge-info"><div class="badge-name">' + label + '</div><div class="badge-desc">' + req + '</div></div>' +
          '<div class="badge-status">' + (earned ? "✅ 達成" : (loggedIn ? "未達成" : "-")) + '</div>';
        return row;
      }

      // --- 訪問数バッジ ---
      var sec1 = document.createElement("div");
      sec1.className = "missions-section";
      sec1.innerHTML = '<h2>訪問数バッジ（' + (loggedIn ? visitedCount + " / " + total + " 館達成" : "ログインで表示") + '）</h2>';
      var list1 = document.createElement("div");
      list1.className = "badge-list";
      VISIT_BADGES.forEach(function(b) {
        list1.appendChild(makeRow(b.icon, b.label, b.req, loggedIn && b.check(visitedCount, total), ""));
      });
      sec1.appendChild(list1);
      content.appendChild(sec1);

      // --- 生き物バッジ ---
      var sec4 = document.createElement("div");
      sec4.className = "missions-section";
      sec4.innerHTML = '<h2>生き物バッジ</h2>';
      var list4 = document.createElement("div");
      list4.className = "badge-list";
      ANIMAL_BADGES.forEach(function(b) {
        list4.appendChild(makeRow(b.icon, b.label, b.req, loggedIn && b.check(items), "animal"));
      });
      sec4.appendChild(list4);
      content.appendChild(sec4);

      // --- 地域制覇 ---
      var sec3 = document.createElement("div");
      sec3.className = "missions-section";
      var completedRegions = loggedIn ? REGION_ORDER.filter(function(r) {
        var inR = openItems.filter(function(x) { return regionOf(x.prefecture) === r; });
        return inR.length > 0 && inR.every(function(x) { return x.visited; });
      }).length : 0;
      sec3.innerHTML = '<h2>地域制覇（' + (loggedIn ? completedRegions + " / " + REGION_ORDER.length + " 地域達成" : "ログインで表示") + '）</h2>';
      var list3 = document.createElement("div");
      list3.className = "badge-list";
      REGION_ORDER.forEach(function(r) {
        var inR = openItems.filter(function(x) { return regionOf(x.prefecture) === r; });
        var visitedInR = loggedIn ? inR.filter(function(x) { return x.visited; }).length : 0;
        var earned = loggedIn && inR.length > 0 && inR.every(function(x) { return x.visited; });
        var req = loggedIn ? visitedInR + " / " + inR.length + " 館" : inR.length + " 館";
        list3.appendChild(makeRow("🗾", r + "制覇", req, earned, "region"));
      });
      sec3.appendChild(list3);
      content.appendChild(sec3);

      // --- 都道府県制覇 ---
      var sec2 = document.createElement("div");
      sec2.className = "missions-section";
      var prefs = [...new Set(openItems.map(function(x) { return x.prefecture; }))].sort(function(a, b) { return a.localeCompare(b, "ja"); });
      var completedCount = loggedIn ? prefs.filter(function(p) {
        var inPref = openItems.filter(function(x) { return x.prefecture === p; });
        return inPref.length > 0 && inPref.every(function(x) { return x.visited; });
      }).length : 0;
      sec2.innerHTML = '<h2>都道府県制覇（' + (loggedIn ? completedCount + " / " + prefs.length + " 県達成" : "ログインで表示") + '）</h2>';
      var grid = document.createElement("div");
      grid.className = "pref-grid";
      prefs.forEach(function(p) {
        var inPref = openItems.filter(function(x) { return x.prefecture === p; });
        var visitedInPref = loggedIn ? inPref.filter(function(x) { return x.visited; }).length : 0;
        var earned = loggedIn && inPref.length > 0 && inPref.every(function(x) { return x.visited; });
        var item = document.createElement("div");
        item.className = "pref-item" + (earned ? " earned" : "");
        item.innerHTML =
          '<span class="pref-name">' + (earned ? "📍 " : "") + p + '</span>' +
          '<span class="pref-progress">' + (loggedIn ? visitedInPref + "/" + inPref.length : inPref.length + "館") + '</span>';
        grid.appendChild(item);
      });
      sec2.appendChild(grid);
      content.appendChild(sec2);
    })();
  })();
  </script>
</body>
</html>
