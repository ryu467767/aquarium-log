<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="google-site-verification" content="E_gwy4ExDGe3hqPfeYcgN89KmtqQZkpa7UsnWmhJb6w" />
  <title>全国水族館スタンプラリー</title>
  <link rel="stylesheet" href="styles.css?v=20260302-16">
  <link rel="stylesheet" href="styles.layout.css?v=20260302-12">
  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
  <title>全国水族館スタンプラリー｜日本全国の水族館を巡ろう</title>

  <meta name="description"
      content="日本全国の水族館を地図でチェック。訪問記録・スタンプラリー形式で楽しめる水族館管理アプリ。">
  <link rel="canonical" href="https://aquarium-log.onrender.com/">
  <meta property="og:title" content="全国水族館スタンプラリー">
  <meta property="og:description" content="日本全国の水族館を巡るスタンプラリーアプリ。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aquarium-log.onrender.com/">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "全国水族館スタンプラリー",
      "url": "https://aquarium-log.onrender.com/",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "All",
      "description": "日本全国の水族館を地図で管理できるスタンプラリーアプリ。訪問記録やチェック機能付き。"
    }
    </script>    


</head>
<body>
  <header>
    <h1>全国水族館スタンプラリー</h1>  
    <div class="stats" id="stats">
      <div class="stats-row">
        <span id="statsText">loading...</span>
        <span id="statsPct"></span>
      </div>
      <div class="progress">
        <div class="bar" id="progressBar"></div>
      </div>
    </div>    
        <div class="userbox" id="userbox">
            <span class="usertext" id="loginStatus"></span>
            <button class="linklike" id="googleLogin" type="button">ログイン</button>
            <button class="linklike" id="logoutBtn" type="button" style="display:none;">ログアウト</button>
          </div>


  </header>

  <section class="panel">
    <div id="loginCta" class="login-cta" style="display:none;">
      <div class="login-cta__inner">
        <div class="login-cta__left">
          <div class="login-cta__icon">🔐</div>
          <div class="login-cta__text">
            <div class="login-cta__title">全国の水族館を踏破しよう</div>
            <div class="login-cta__desc">ログインで訪問済・メモ・写真追加が使えます</div>
          </div>
        </div>
    
        <button id="loginCtaBtn" class="login-cta__btn" type="button">
          Googleでログイン
        </button>
      </div>
    </div>
    <label class="row">
      <span>検索</span>
      <input id="q" type="text" placeholder="施設名/都道府県/市区町村" />
      <button id="searchBtn">検索</button>
    </label>
    
    
    <select id="pref-filter">
      <option value="">都道府県（すべて）</option>
    </select>
    

    <div class="chips-row">
      <button class="chip" data-filter="all">全部</button>
      <button class="chip" data-filter="visited">行った</button>
      <button class="chip" data-filter="want_to_go">行きたい</button>
      <button class="chip" data-filter="unvisited">未訪問</button>
    </div>
    
  </section>
  <section class="mapwrap">
    <div id="map"></div>
  </section>

  <div class="sortBar">
    <label class="row row-compact">
      <span>並び替え</span>
      <select id="sort">
        <option value="pref_plain">都道府県順</option>
        <option value="pref">地域別</option>
        <option value="name">五十音順</option>
        <option value="visit_count">訪問回数順</option>
        <option value="visited_at">訪問日順</option>
      </select>      
    </label>
  </div>
  

  
  <main id="list"></main>
  <footer class="site-footer">
    <div class="footer-inner">
      <section id="timeline" class="panel timeline" style="display:none;">
        <h2 class="timeline__title">更新履歴</h2>
        <div id="timelineList" class="timeline__list"></div>
      </section>
      <a href="/about/">このアプリについて</a>
      <span>© 2025 全国水族館スタンプラリー</span>
    </div>
  </footer>  
  <!-- カスタム確認モーダル -->
  <div id="confirmModal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="modal-box">
      <p class="modal-title" id="confirmTitle"></p>
      <p class="modal-body" id="confirmBody"></p>
      <div class="modal-actions">
        <button id="confirmOk" class="modal-btn modal-btn--danger">解除する</button>
        <button id="confirmCancel" class="modal-btn modal-btn--cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js?v=20260302-4"></script>
</body>
</html>
