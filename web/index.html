<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="google-site-verification" content="E_gwy4ExDGe3hqPfeYcgN89KmtqQZkpa7UsnWmhJb6w" />
  <title>全国水族館スタンプラリー｜日本全国の水族館を巡ろう</title>
  <link rel="stylesheet" href="styles.css?v=20260305-21">
  <link rel="stylesheet" href="styles.layout.css?v=20260305-19">
  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

  <meta name="description"
      content="日本全国の水族館を地図でチェックできる無料スタンプラリーアプリ。訪問記録・訪問日・回数・写真・メモを管理。海遊館、沖縄美ら海水族館など全国の水族館に対応。">
  <link rel="canonical" href="https://aquarium-log.onrender.com/">
  <meta property="og:title" content="全国水族館スタンプラリー">
  <meta property="og:description" content="日本全国の水族館を巡るスタンプラリーアプリ。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aquarium-log.onrender.com/">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "全国水族館スタンプラリー",
      "url": "https://aquarium-log.onrender.com/",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "All",
      "description": "日本全国の水族館を地図で管理できるスタンプラリーアプリ。訪問記録やチェック機能付き。"
    }
    </script>

</head>
<body>
  <header>
    <h1>全国水族館スタンプラリー</h1>
    <div class="userbox" id="userbox">
      <button id="menuBtn" class="hamburger-btn" aria-label="メニューを開く">☰</button>
    </div>
  </header>

  <!-- ドロワーオーバーレイ -->
  <div id="drawerOverlay" class="drawer-overlay"></div>

  <!-- ドロワー（右からスライド） -->
  <nav id="drawer" class="drawer" aria-hidden="true">
    <button id="drawerClose" class="drawer-close" aria-label="閉じる">×</button>

    <!-- ログイン状態エリア -->
    <div class="drawer__login">
      <span id="loginStatus" class="drawer-login-status"></span>
      <button class="linklike" id="googleLogin" type="button">Googleでログイン</button>
      <button class="linklike" id="logoutBtn" type="button" style="display:none;">ログアウト</button>
    </div>

    <div class="drawer__inner">
      <a href="/" class="drawer-link drawer-link--active">トップページ</a>
      <a href="/about/" class="drawer-link">このアプリについて</a>
      <a href="/contact/" class="drawer-link">お問い合わせ</a>
      <a href="/privacy/" class="drawer-link">プライバシーポリシー</a>
    </div>
  </nav>

  <!-- Stats Dashboard（ログイン時のみ表示） -->
  <div id="statsDashboard" class="stats-dashboard" style="display:none;">
    <div class="stats-dashboard__label">訪問状況</div>
    <div class="stats-dashboard__row">
      <span id="statsText" class="stats-dashboard__num">-</span>
      <span id="statsPct" class="stats-dashboard__pct"></span>
    </div>
    <div class="progress">
      <div class="bar" id="progressBar"></div>
    </div>
  </div>

  <!-- Login CTA（未ログイン時のみ表示） -->
  <div id="loginCta" class="login-cta" style="display:none;">
    <div class="login-cta__inner">
      <div class="login-cta__left">
        <div class="login-cta__icon">🔐</div>
        <div class="login-cta__text">
          <div class="login-cta__title">全国の水族館を踏破しよう</div>
          <div class="login-cta__desc">ログインで訪問済・メモ・写真追加が使えます</div>
        </div>
      </div>
      <button id="loginCtaBtn" class="login-cta__btn" type="button">
        Googleでログイン
      </button>
    </div>
  </div>

  <section class="panel">
    <label class="row">
      <span>検索</span>
      <span class="suggest-wrap">
        <input id="q" type="text" placeholder="施設名/都道府県/市区町村" />
        <ul id="suggestList" class="suggest-list" style="display:none;"></ul>
      </span>
      <button id="searchBtn">検索</button>
    </label>

    <select id="pref-filter">
      <option value="">都道府県（すべて）</option>
    </select>

    <div class="chips-row">
      <button class="chip" data-filter="all">全部</button>
      <button class="chip" data-filter="visited">行った</button>
      <button class="chip" data-filter="want_to_go">行きたい</button>
      <button class="chip" data-filter="unvisited">未訪問</button>
    </div>

    <div class="animal-filter">
      <span class="animal-filter__label">生き物で絞り込み</span>
      <div class="animal-chips-row">
        <button class="animal-chip" data-animal="has_penguin">🐧 ペンギン</button>
        <button class="animal-chip" data-animal="has_dolphin">🐬 イルカ</button>
        <button class="animal-chip" data-animal="has_sealion">🦭 アシカ</button>
        <button class="animal-chip" data-animal="has_orca">🐋 シャチ</button>
        <button class="animal-chip" data-animal="has_jellyfish">🪼 クラゲ</button>
      </div>
    </div>
  </section>

  <section class="mapwrap">
    <div id="map"></div>
  </section>

  <div class="sortBar">
    <label class="row row-compact">
      <span>並び替え</span>
      <select id="sort">
        <option value="pref_plain">都道府県順</option>
        <option value="pref">地域別</option>
        <option value="name">五十音順</option>
        <option value="visit_count">訪問回数順</option>
        <option value="visited_at">訪問日順</option>
      </select>
    </label>
  </div>

  <main id="list"></main>

  <footer class="site-footer">
    <div class="footer-inner">
      <a href="/contact/">お問い合わせ</a>
      <a href="/privacy/">プライバシーポリシー</a>
      <span>© 2025 全国水族館スタンプラリー</span>
    </div>
  </footer>

  <!-- カスタム確認モーダル -->
  <div id="confirmModal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="modal-box">
      <p class="modal-title" id="confirmTitle"></p>
      <p class="modal-body" id="confirmBody"></p>
      <div class="modal-actions">
        <button id="confirmOk" class="modal-btn modal-btn--danger">解除する</button>
        <button id="confirmCancel" class="modal-btn modal-btn--cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js?v=20260305-13"></script>
</body>
</html>
