  <!-- 小さな泡 -->
  <circle cx="90" cy="180" r="9" fill="white" opacity="0.6"/>
  <circle cx="72" cy="155" r="5" fill="white" opacity="0.4"/>
  <circle cx="108" cy="148" r="6" fill="white" opacity="0.5"/>
